tag_prefix = "v"
from_latest_tag = true

skip_ci = true

pre_bump_hooks = [
  "sed -i 's/^version = \"[0-9]*\\.[0-9]*\\.[0-9]*\"/version = \"{{version}}\"/' Cargo.toml",
  "cargo generate-lockfile",
]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
repository = "lazy-typr"
owner = "Hai-Fai-Solutions"
