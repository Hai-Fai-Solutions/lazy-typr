name: Bump version

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bump:
    name: cog bump --auto
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # cog needs full tag history to calculate bump
          token: ${{ secrets.COG_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cocogitto
        uses: cocogitto/cocogitto-action@v3
        with:
          check: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: cog bump --auto

      - name: Push bump commit and tag
        run: |
          if git describe --exact-match HEAD 2>/dev/null | grep -qE '^v[0-9]'; then
            git push --follow-tags
          else
            echo "No new tag on HEAD — nothing to push"
          fi
